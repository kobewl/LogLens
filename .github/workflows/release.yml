name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.5.0)'
        required: true

jobs:
  # ─── macOS Universal (ARM + Intel 交叉编译) ──────────────────────────────────
  build-macos:
    name: macOS (ARM + Intel)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Rust with cross-compilation targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend deps
        run: pnpm install

      - name: Build Tauri (macOS ARM)
        run: pnpm tauri build --target aarch64-apple-darwin

      - name: Build Tauri (macOS Intel)
        run: pnpm tauri build --target x86_64-apple-darwin

      - name: Collect macOS artifacts
        run: |
          mkdir -p release-artifacts
          # ARM DMG
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*_aarch64.dmg release-artifacts/ 2>/dev/null || true
          # Intel DMG
          cp src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*_x64.dmg release-artifacts/ 2>/dev/null || true
          ls -la release-artifacts/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: release-artifacts/*.dmg

  # ─── Windows (x86_64) ────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend deps
        run: pnpm install

      - name: Build Tauri (Windows)
        run: pnpm tauri build --target x86_64-pc-windows-msvc

      - name: Collect Windows artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          cp src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi release-artifacts/ 2>/dev/null || true
          cp src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe release-artifacts/ 2>/dev/null || true
          ls -la release-artifacts/

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release-artifacts/

  # ─── Create Release ──────────────────────────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos
          path: assets/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: assets/

      - name: List assets
        run: ls -la assets/

      - name: Get version
        id: ver
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Delete existing release if any
        run: |
          gh release delete "${{ steps.ver.outputs.tag }}" --yes 2>/dev/null || true
          git push origin --delete "${{ steps.ver.outputs.tag }}" 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Recreate tag
        run: |
          git tag -d "${{ steps.ver.outputs.tag }}" 2>/dev/null || true
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}" --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body: |
            ## 📦 下载

            | 平台 | 架构 | 安装 |
            |------|------|------|
            | 🍎 macOS | ARM (M1/M2/M3) | 下载 `.dmg`，拖入 Applications |
            | 🍎 macOS | Intel | 下载 `.dmg`，拖入 Applications |
            | 🪟 Windows | x86_64 | 下载 `.msi` 或 `.exe` 安装 |

            ### ✨ 新功能
            - MCP 服务器 GUI 启动时自动运行在 localhost:19527
            - 跨平台支持（macOS ARM + Intel + Windows）
            - 版本更新系统（自动检查 + Release Notes 弹窗）

            ### 📦 MCP 工具（8个）
            search_local_logs / tail_log_file / search_all_logs / get_log_context
            list_log_sessions / get_log_stats / list_cloud_projects / search_cloud_logs
          files: assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
